<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="app-layout" class="app-layout">

    <!-- ── Sidebar ─────────────────────────────────────────────────── -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Markdown Viewer</span>
      </div>

      <div class="sidebar-actions">
        <button id="open-file-btn" class="sidebar-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 14V2h4l2 2h6v10H2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
          </svg>
          Open File
        </button>
        <button id="new-file-btn" class="sidebar-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          New File
        </button>
      </div>

      <div id="recent-section" class="sidebar-section" style="display:none;">
        <div class="sidebar-section-header">
          <span>Recent</span>
          <button id="clear-recent-btn" class="sidebar-section-action" title="Clear all">Clear</button>
        </div>
        <ul id="recent-list" class="sidebar-list"></ul>
      </div>

      <div class="sidebar-footer">
        <div class="keyboard-hints">
          <span><kbd>&#8984;O</kbd> Open</span>
          <span><kbd>&#8984;E</kbd> Edit</span>
          <span><kbd>&#8984;S</kbd> Save</span>
        </div>
      </div>
    </aside>

    <!-- ── Main Content ────────────────────────────────────────────── -->
    <main id="main-content" class="main-content">

      <!-- Welcome (no file open) -->
      <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-inner">
          <div class="welcome-icon">
            <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
              <rect x="2" y="6" width="44" height="36" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M10 32V16l6 8 6-8v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path d="M32 24v8m0 0l4-4m-4 4l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>Markdown Viewer</h1>
          <p>Open a file to get started, or drag & drop a <code>.md</code> file anywhere.</p>
          <button id="welcome-open-btn" class="open-btn">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
              <path d="M2 14V2h4l2 2h6v10H2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
            </svg>
            Open Markdown File
          </button>
        </div>
      </div>

      <!-- Reader view -->
      <div id="reader-screen" class="reader-screen" style="display:none;">
        <div class="reader-toolbar">
          <span id="file-name" class="file-name"></span>
          <span id="file-path-display" class="file-path-display"></span>
          <div class="toolbar-spacer"></div>
          <div id="save-indicator" class="save-indicator" style="display:none;">Saved</div>
          <button id="edit-btn" class="toolbar-btn toolbar-btn-label" title="Toggle edit mode (⌘E)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
            </svg>
            <span>Edit</span>
          </button>
        </div>

        <!-- View mode -->
        <article id="markdown-body" class="markdown-body"></article>

        <!-- Edit mode -->
        <div id="editor-container" class="editor-container" style="display:none;">
          <textarea id="editor" class="editor" spellcheck="true" placeholder="Start writing markdown..."></textarea>
          <article id="editor-preview" class="markdown-body editor-preview"></article>
        </div>
      </div>

    </main>
  </div>

  <!-- ── Drop overlay ────────────────────────────────────────────── -->
  <div id="drop-overlay" class="drop-overlay">
    <div class="drop-message">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <path d="M24 8v32M8 24h32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <p>Drop markdown file here</p>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
